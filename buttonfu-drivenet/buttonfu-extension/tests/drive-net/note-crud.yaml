# Full create → verify → delete lifecycle for a note in the
# embedded ButtonFu Note Editor webview panel. Also validates the
# current sticky-header create flow.

name: Note Split Button Smoke

app:
  process_name: Code
  window_title_regex: '\[Extension Development Host\]'
  single_instance: reuse

setup:
  - tool: interact
    action: sendKeys
    comment: Clear any open palette or dialog before starting.
    args:
      keys: "Escape"
    continue_on_failure: true
    delay_after_ms: 300

tests:
  # ── Open the Note Editor ──────────────────────────────────────────
  - name: open note editor from the sidebar
    steps:
      - tool: interact
        action: sendKeys
        comment: Dismiss any previously-open editor chrome.
        args:
          keys: "Escape"
        continue_on_failure: true
        delay_after_ms: 300

      - tool: query
        action: find
        comment: The embedded Notes gear action should already be visible in the sidebar.
        args:
          automation_id: openNoteEditorBtn
          max_results: 20
          fallback: true
        expect:
          success: true
          count: 1
        save:
          open_note_editor_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Open the Note Editor.
        args:
          element_id: "${open_note_editor_btn}"
        expect:
          success: true
        delay_after_ms: 1500

      - tool: capture
        comment: Verify the note editor panel opened.
        args:
          output: note-crud-01-editor-opened.png
        expect:
          success: true

  # ── Discover editor element structure ─────────────────────────────
  - name: discover note editor webview tree
    steps:
      - tool: query
        action: find
        comment: The Note Editor tab should be active.
        args:
          name: "ButtonFu - Note Editor"
          fallback: true
          max_results: 20
        expect:
          success: true
          count_gte: 1

      - tool: query
        action: tree
        comment: >
          Dump the tree inside the note editor to discover the webview
          element hierarchy and verify the content loaded.
        args:
          max_depth: 16
          max_nodes: 1200
        expect:
          success: true
        save:
          editor_tree_nodes: $.nodeCount

  # ── Verify sticky header buttons ─────────────────────────────────
  - name: verify create-mode header action buttons
    steps:
      - tool: query
        action: find
        comment: Find the Save button in the sticky header.
        args:
          automation_id: saveBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1

      - tool: query
        action: find
        comment: In create mode the secondary header action is Cancel.
        args:
          automation_id: closeBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1

  # ── Fill note fields ──────────────────────────────────────────────
  - name: fill note scope name and content
    steps:
      - tool: query
        action: find
        comment: Find the Scope select so the new note can be saved as a workspace note.
        args:
          automation_id: nodeLocality
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          scope_select: $.items[0].elementId

      - tool: interact
        action: select
        comment: Change the note scope to the current workspace.
        args:
          element_id: "${scope_select}"
          value: "Workspace"
        expect:
          success: true

      - tool: query
        action: find
        comment: Find the Name text input.
        args:
          automation_id: nodeName
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          name_input: $.items[0].elementId

      - tool: interact
        action: type
        comment: The Name field should already be focused when a new note opens.
        args:
          element_id: "${name_input}"
          value: "${appSessionId}"
        expect:
          success: true

      - tool: query
        action: find
        comment: Find the Content textarea (visible for notes, hidden for folders).
        args:
          automation_id: noteContent
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          content_input: $.items[0].elementId

      - tool: interact
        action: type
        comment: Enter test note content.
        args:
          element_id: "${content_input}"
          value: "This note was created by a Drive.NET automation test."
        expect:
          success: true

  # ── Save the note ─────────────────────────────────────────────────
  - name: save the new note
    steps:
      - tool: query
        action: find
        comment: Re-resolve the Save button inside the Note Editor header.
        args:
          automation_id: saveBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          save_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Click Save in the sticky header.
        args:
          element_id: "${save_btn}"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: capture
        comment: Screenshot after save.
        args:
          output: note-crud-02-saved.png
        expect:
          success: true

  # ── Verify the note persisted in the workspace sidebar flow ───────
  - name: verify note in workspace split-button flow
    steps:
      - tool: interact
        action: sendKeys
        comment: Close the note editor so the sidebar has no active text editor.
        args:
          keys: "Ctrl+F4"
        expect:
          success: true
        delay_after_ms: 800

      - tool: query
        action: find
        comment: Count the current note split-button toggles so the newest note can be re-resolved deterministically.
        args:
          class_name: fu-note-toggle
          control_type: Button
          fallback: true
          max_results: 20
        expect:
          success: true
          count_gte: 2
        save:
          note_toggle_count: $.count

      - tool: query
        action: find
        comment: Resolve the newest note's split-button toggle using the current count as a 1-based match index.
        args:
          class_name: fu-note-toggle
          control_type: Button
          fallback: true
          max_results: 20
          match_index: "${note_toggle_count}"
        expect:
          success: true
          count: 1
        save:
          note_menu_toggle: $.items[0].elementId
          note_menu_toggle_automation_id: $.items[0].automationId

  # ── Insert into a new document when no editor is active ───────────
  - name: insert note into a new untitled editor from the split menu
    steps:
      - tool: query
        action: find
        comment: Re-resolve the saved note's split-button menu toggle for this test scope.
        args:
          automation_id: "${note_menu_toggle_automation_id}"
          control_type: Button
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          note_menu_toggle: $.items[0].elementId

      - tool: interact
        action: click
        comment: Open the saved note's split-button menu.
        args:
          element_id: "${note_menu_toggle}"
        expect:
          success: true
        delay_after_ms: 300

      - tool: query
        action: find
        comment: Resolve the Insert menu action from the shared note action menu.
        args:
          automation_id: noteActionInsert
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          note_action_insert: $.items[0].elementId

      - tool: interact
        action: click
        comment: Insert the note into a new untitled editor because no editor is active.
        args:
          element_id: "${note_action_insert}"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: capture
        comment: Capture the newly opened editor after note insertion.
        args:
          output: note-crud-03-inserted-into-new-editor.png
        expect:
          success: true

      - tool: query
        action: find
        comment: The untitled editor tab should reflect the inserted note content.
        args:
          name: "This note was created by a Drive.NET aut • Untitled-1"
          control_type: TabItem
          fallback: true
          max_results: 50
        expect:
          success: true
          count_gte: 1

      - tool: interact
        action: sendKeys
        comment: Close the untitled editor so the note can be edited and deleted from the sidebar.
        args:
          keys: "Ctrl+F4"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: window
        action: list
        comment: Inspect the topmost window after closing the untitled editor to see whether a save-changes modal appeared.
        expect:
          success: true
        save:
          post_insert_top_window: $.items[0].handle
          post_insert_top_window_title: $.items[0].title

      - tool: query
        action: find
        comment: Resolve the Don't Save action from the save-changes modal when it is present.
        args:
          window_handle: "${post_insert_top_window}"
          automation_id: CommandButton_101
          control_type: Button
          fallback: true
          max_results: 10
        expect:
          success: true
          count: 1
        save:
          dont_save_editor_button: $.items[0].elementId
        when:
          variable: post_insert_top_window_title
          equals: "Visual Studio Code"

      - tool: interact
        action: click
        comment: Dismiss the modified-editor close prompt without saving when it appears.
        args:
          element_id: "${dont_save_editor_button}"
        expect:
          success: true
        delay_after_ms: 700
        when:
          variable: dont_save_editor_button
          exists: true

      - tool: window
        action: list
        comment: Refresh the window list after optional dialog dismissal so later steps interact with the host again.
        expect:
          success: true

  # ── Delete the test note ──────────────────────────────────────────
  - name: edit then delete the test note from the split menu
    steps:
      - tool: query
        action: find
        comment: Re-resolve the saved note's split-button menu toggle for this test scope.
        args:
          automation_id: "${note_menu_toggle_automation_id}"
          control_type: Button
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          note_menu_toggle: $.items[0].elementId

      - tool: interact
        action: click
        comment: Re-open the note split-button menu.
        args:
          element_id: "${note_menu_toggle}"
        expect:
          success: true
        delay_after_ms: 300

      - tool: query
        action: find
        comment: Use the shared Edit action from the note split menu.
        args:
          automation_id: noteActionEdit
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        retry:
          max_attempts: 4
          delay_ms: 250
        save:
          note_action_edit: $.items[0].elementId

      - tool: interact
        action: click
        comment: Open the saved note back in the Note Editor.
        args:
          element_id: "${note_action_edit}"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: query
        action: find
        comment: Delete becomes available after the note has been saved.
        args:
          automation_id: deleteBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          delete_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Click Delete in the sticky header to open the native confirmation dialog.
        args:
          element_id: "${delete_btn}"
          expected_effect: windowOpened
          effect_timeout_ms: 3000
        expect:
          success: true
        delay_after_ms: 300

      - tool: window
        action: list
        comment: The native confirmation dialog should be the topmost window after Delete is clicked.
        expect:
          success: true
        save:
          delete_confirm_window: $.items[0].handle

      - tool: window
        action: bringToFront
        comment: Bring the native confirmation dialog to the foreground before accepting it.
        args:
          window_handle: "${delete_confirm_window}"
        expect:
          success: true
        delay_after_ms: 150

      - tool: interact
        action: sendKeys
        comment: Confirm the focused native deletion dialog.
        args:
          window_handle: "${delete_confirm_window}"
          keys: "Enter"
        expect:
          success: true
        delay_after_ms: 1500

      - tool: capture
        comment: Final state after deleting the test note.
        args:
          output: note-crud-04-deleted.png
        expect:
          success: true

  # ── Verify note was removed ───────────────────────────────────────
  - name: verify note removed from split-button sidebar
    steps:
      - tool: query
        action: find
        comment: The deleted note's exact split-button menu automation id should no longer exist.
        args:
          automation_id: "${note_menu_toggle_automation_id}"
          control_type: Button
          max_results: 20
        retry:
          max_attempts: 8
          delay_ms: 500
        expect:
          success: true
          count: 0

teardown:
  - tool: interact
    action: sendKeys
    comment: Close the editor tab.
    args:
      keys: "Ctrl+F4"
    continue_on_failure: true

finally:
  - tool: interact
    action: sendKeys
    comment: Dismiss any remaining overlay.
    args:
      keys: "Escape"
    continue_on_failure: true
