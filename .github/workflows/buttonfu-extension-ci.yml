name: ButtonFu Extension CI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/buttonfu-extension-ci.yml'
      - 'buttonfu-extension/**'
  pull_request:
    paths:
      - '.github/workflows/buttonfu-extension-ci.yml'
      - 'buttonfu-extension/**'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        working-directory: buttonfu-extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: buttonfu-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: buttonfu-extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: buttonfu-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npm run vsce-package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: buttonfu-extension-vsix
          path: buttonfu-extension/*.vsix
          if-no-files-found: error