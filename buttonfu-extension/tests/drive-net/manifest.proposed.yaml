# Proposed future-state manifest for ButtonFu once Drive.NET supports:
#   - attach_only app sessions
#   - exact window-handle or session-id attach overrides
#   - manifest-level shared sessions
#   - transient attach retry
#   - incremental result flushing and resume
#
# This file is documentation for future Drive.NET work. The current
# runner does not understand these fields yet.

name: ButtonFu Extension UI Tests

app:
  process_name: Code
  window_title_regex: '\[Extension Development Host\]'
  attach_only: true
  window_handle: "${env:BUTTONFU_HOST_HWND}"
  session_id: "${env:BUTTONFU_SESSION_ID}"
  attach_mode: processVisibleWindow
  session_start_warning: false
  transient_attach_retry:
    max_attempts: 8
    delay_ms: 250
    retry_on:
      - "No process is associated with this object."
      - "main window became invalid"

shared_session:
  enabled: true
  scope: manifest
  alias: app

results:
  incremental_flush: true
  checkpoint_file: .drive-net/test-results-live-smoke.checkpoints.json
  resume_supported: true

suites:
  - activation.yaml
  - button-crud.yaml
  - note-crud.yaml