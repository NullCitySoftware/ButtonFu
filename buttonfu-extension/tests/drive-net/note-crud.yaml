# Full create → verify → delete lifecycle for a note in the
# embedded ButtonFu Note Editor webview panel. Also validates the
# current sticky-header create flow.

name: Note Split Button Smoke

app:
  process_name: Code
  window_title_regex: '\[Extension Development Host\]'
  single_instance: reuse

setup:
  - tool: interact
    action: sendKeys
    comment: Clear any open palette or dialog before starting.
    args:
      keys: "Escape"
    continue_on_failure: true
    delay_after_ms: 300

tests:
  # ── Open the Note Editor ──────────────────────────────────────────
  - name: open note editor from the sidebar
    steps:
      - tool: interact
        action: sendKeys
        comment: Dismiss any previously-open editor chrome.
        args:
          keys: "Escape"
        continue_on_failure: true
        delay_after_ms: 300

      - tool: query
        action: find
        comment: The embedded Notes gear action should already be visible in the sidebar.
        args:
          automation_id: openNoteEditorBtn
          max_results: 20
          fallback: true
        expect:
          success: true
          count: 1
        save:
          open_note_editor_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Open the Note Editor.
        args:
          element_id: "${open_note_editor_btn}"
        expect:
          success: true
        delay_after_ms: 1500

      - tool: capture
        comment: Verify the note editor panel opened.
        args:
          output: note-crud-01-editor-opened.png
        expect:
          success: true

  # ── Discover editor element structure ─────────────────────────────
  - name: discover note editor webview tree
    steps:
      - tool: query
        action: find
        comment: The focused Note Editor title should be visible.
        args:
          automation_id: editorTitle
          control_type: Text
          fallback: true
          max_results: 50
        expect:
          success: true
          count_gte: 1

      - tool: query
        action: tree
        comment: >
          Dump the tree inside the note editor to discover the webview
          element hierarchy and verify the content loaded.
        args:
          max_depth: 16
          max_nodes: 1200
        expect:
          success: true
        save:
          editor_tree_nodes: $.nodeCount

  # ── Verify sticky header buttons ─────────────────────────────────
  - name: verify create-mode header action buttons
    steps:
      - tool: query
        action: find
        comment: Find the Save button in the sticky header.
        args:
          automation_id: saveBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1

      - tool: query
        action: find
        comment: In create mode the secondary header action is Cancel.
        args:
          automation_id: closeBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1

  # ── Fill note fields ──────────────────────────────────────────────
  - name: fill note scope name and content
    steps:
      - tool: query
        action: find
        comment: Find the Scope select so the new note can be saved as a workspace note.
        args:
          automation_id: nodeLocality
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          scope_select: $.items[0].elementId

      - tool: interact
        action: select
        comment: Change the note scope to the current workspace.
        args:
          element_id: "${scope_select}"
          value: "Workspace"
        expect:
          success: true

      - tool: query
        action: find
        comment: Find the Name text input.
        args:
          automation_id: nodeName
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          name_input: $.items[0].elementId

      - tool: interact
        action: type
        comment: The Name field should already be focused when a new note opens.
        args:
          element_id: "${name_input}"
          value: "Drive.NET Smoke ${appSessionId}"
        expect:
          success: true

      - tool: query
        action: find
        comment: Find the Content textarea (visible for notes, hidden for folders).
        args:
          automation_id: noteContent
          fallback: true
          max_results: 20
        expect:
          success: true
        save:
          content_input: $.items[0].elementId

      - tool: interact
        action: type
        comment: Enter test note content.
        args:
          element_id: "${content_input}"
          value: "This note was created by a Drive.NET automation test."
        expect:
          success: true

  # ── Save the note ─────────────────────────────────────────────────
  - name: save the new note
    steps:
      - tool: query
        action: find
        comment: Re-resolve the Save button inside the Note Editor header.
        args:
          automation_id: saveBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          save_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Click Save in the sticky header.
        args:
          element_id: "${save_btn}"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: capture
        comment: Screenshot after save.
        args:
          output: note-crud-02-saved.png
        expect:
          success: true

  # ── Return to sidebar after save ───────────────────────────────────
  - name: return to sidebar after save
    steps:
      - tool: interact
        action: sendKeys
        comment: Close the note editor so the sidebar has no active text editor.
        args:
          keys: "Ctrl+F4"
        expect:
          success: true
        delay_after_ms: 800

      - tool: capture
        comment: Capture the sidebar after returning from the note editor.
        args:
          output: note-crud-02a-sidebar-after-save.png
        expect:
          success: true

  # ── Verify the note also appears in the editor workspace list ────
  - name: verify workspace note row in button editor
    steps:
      - tool: query
        action: find
        comment: Use the sidebar footer Editor action to open the shared Button Editor.
        args:
          automation_id: editAllBtn
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          open_button_editor_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Open the Button Editor so the workspace list can be inspected.
        args:
          element_id: "${open_button_editor_btn}"
        expect:
          success: true
        delay_after_ms: 1500

      - tool: query
        action: find
        comment: Resolve the Workspace tab inside the Button Editor.
        args:
          automation_id: localTab
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          workspace_items_tab: $.items[0].elementId

      - tool: interact
        action: click
        comment: Switch the editor list to the Workspace tab.
        args:
          element_id: "${workspace_items_tab}"
        expect:
          success: true
        delay_after_ms: 500

      - tool: query
        action: find
        comment: The newly created workspace note should now appear as an editor list row, not just in the sidebar split-button flow.
        args:
          name: "Drive.NET Smoke ${appSessionId}"
          fallback: true
          max_results: 50
        expect:
          success: true
          count_gte: 1
        save:
          note_row_group: $.items[0].elementId

      - tool: capture
        comment: Capture the workspace editor list with the note row visible.
        args:
          output: note-crud-02b-editor-workspace-row.png
        expect:
          success: true

  # ── Re-open note editor from sidebar action ────────────────────────
  - name: reopen note editor from sidebar action
    steps:
      - tool: query
        action: find
        comment: Resolve the sidebar Note Editor footer action.
        args:
          automation_id: openNoteEditorBtn
          control_type: Button
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1
        save:
          open_note_editor_btn: $.items[0].elementId

      - tool: interact
        action: click
        comment: Re-open the Note Editor via the sidebar footer button.
        args:
          element_id: "${open_note_editor_btn}"
        expect:
          success: true
        delay_after_ms: 1200

      - tool: capture
        comment: Capture the opened note editor after invoking the split primary action.
        args:
          output: note-crud-03-opened-from-split-primary.png
        expect:
          success: true

      - tool: query
        action: find
        comment: The note editor title should be visible after reopening.
        args:
          automation_id: editorTitle
          control_type: Text
          fallback: true
          max_results: 20
        expect:
          success: true
          count_gte: 1

      - tool: interact
        action: sendKeys
        comment: Close the note editor so delete flow can re-open cleanly.
        args:
          keys: "Ctrl+F4"
        expect:
          success: true
        delay_after_ms: 1000

  # ── Return from note editor to sidebar ─────────────────────────────
  - name: return from note editor to sidebar
    steps:
      - tool: interact
        action: sendKeys
        comment: Close the note editor tab and return to the sidebar view.
        args:
          keys: "Ctrl+F4"
        expect:
          success: true
        delay_after_ms: 900

      - tool: capture
        comment: Capture the sidebar after closing the note editor.
        args:
          output: note-crud-04-sidebar-returned.png
        expect:
          success: true

  # ── Verify sidebar actions still available ─────────────────────────
  - name: verify sidebar action buttons available
    steps:
      - tool: query
        action: find
        comment: The sidebar Button Editor action remains discoverable.
        args:
          automation_id: editAllBtn
          control_type: Button
          fallback: true
          max_results: 20
        expect:
          success: true
          count: 1

teardown:
  - tool: interact
    action: sendKeys
    comment: Close the editor tab.
    args:
      keys: "Ctrl+F4"
    continue_on_failure: true

finally:
  - tool: interact
    action: sendKeys
    comment: Dismiss any remaining overlay.
    args:
      keys: "Escape"
    continue_on_failure: true
